<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>关于 Winston - Winston 的时光机</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .edit-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .edit-btn:hover {
      background: var(--accent-dark);
    }
    .edit-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .edit-modal.open {
      display: flex;
    }
    .edit-modal-box {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .edit-modal-box h3 {
      margin-top: 0;
      margin-bottom: 1rem;
    }
    .edit-modal-box textarea {
      width: 100%;
      min-height: 300px;
      padding: 0.8rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: Georgia, serif;
      font-size: 0.95rem;
      line-height: 1.6;
      resize: vertical;
    }
    .edit-modal-actions {
      display: flex;
      gap: 0.8rem;
      justify-content: flex-end;
      margin-top: 1rem;
    }
    .about-content {
      min-height: 200px;
    }
  </style>
</head>
<body>
  <header>
    <h1 class="title"><a href="index.html">Winston 的时光机</a></h1>
    <p class="subtitle">一些关于 Winston 的时间碎片</p>
    <div class="paw-divider"></div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="gallery.html">回忆长廊</a></li>
        <li><a href="upload.html">上传回忆</a></li>
        <li><a href="days.html">纪念日</a></li>
        <li><a href="about.html" class="active">关于 Winston</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="memory-card">
      <h2 class="section-title">关于 Winston</h2>
      <div id="aboutContent" class="about-content">
        <p style="color: var(--ink-light);">加载中...</p>
      </div>

      <div style="text-align: center; margin-top: 2rem;">
        <a href="upload.html" class="btn-primary">放一张他的照片</a>
      </div>
    </section>
  </main>

  <footer>
    Winston 还在这里 · 原型版本
  </footer>

  <!-- 编辑按钮 -->
  <button class="edit-btn" id="editBtn" title="编辑内容">✏️</button>

  <!-- 编辑弹窗 -->
  <div class="edit-modal" id="editModal">
    <div class="edit-modal-box">
      <h3>编辑关于 Winston</h3>
      <textarea id="aboutEditor" placeholder="在这里编辑内容，支持 HTML 标签..."></textarea>
      <div class="edit-modal-actions">
        <button class="btn-cancel" id="cancelEdit">取消</button>
        <button class="btn-primary" id="saveAbout">保存</button>
      </div>
    </div>
  </div>

  <script src="js/supabase.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async function() {
      try {
        await initDB();
        await loadAboutContent();

        const editBtn = document.getElementById('editBtn');
        const editModal = document.getElementById('editModal');
        const aboutEditor = document.getElementById('aboutEditor');
        const cancelEdit = document.getElementById('cancelEdit');
        const saveAbout = document.getElementById('saveAbout');

        editBtn.addEventListener('click', () => {
          const password = prompt('请输入编辑密码：');
          if (password === 'winston') {
            aboutEditor.value = document.getElementById('aboutContent').innerHTML;
            editModal.classList.add('open');
          } else if (password !== null) {
            alert('密码错误');
          }
        });

        cancelEdit.addEventListener('click', () => editModal.classList.remove('open'));
        editModal.addEventListener('click', (e) => {
          if (e.target === editModal) editModal.classList.remove('open');
        });

        saveAbout.addEventListener('click', async () => {
          const content = aboutEditor.value.trim();
          if (!content) {
            alert('内容不能为空');
            return;
          }
          try {
            await saveAboutContent(content);
            editModal.classList.remove('open');
            await loadAboutContent();
            alert('保存成功');
          } catch (err) {
            alert('保存失败：' + err.message);
          }
        });
      } catch (err) {
        showInitError('关于页初始化失败：' + (err.message || err));
      }
    })();
  </script>
</body>
</html>
