<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>回忆长廊 - Winston 的时光机</title>
  <link rel="stylesheet" href="css/style.css?v=3" />
</head>
<body>
  <header>
    <h1 class="title"><a href="index.html">Winston 的时光机</a></h1>
    <p class="subtitle">一些关于 Winston 的时间碎片</p>
    <div class="paw-divider"></div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="gallery.html" class="active">回忆长廊</a></li>
        <li><a href="upload.html">上传回忆</a></li>
        <li><a href="days.html">纪念日</a></li>
        <li><a href="about.html">关于 Winston</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="memory-card">
      <h2 class="section-title">他出现过的时刻</h2>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="image">照片</button>
        <button class="filter-btn" data-filter="video">视频</button>
        <button class="batch-download-btn" id="batchDownloadToggle">📥 批量下载</button>
      </div>
      <div id="gallery" class="gallery"></div>
    </section>
  </main>

  <!-- 批量操作栏 -->
  <div class="batch-bar" id="batchBar">
    <div class="batch-bar-info">
      <span id="batchCount">已选 0 个</span>
      <button class="batch-btn" id="batchSelectAll" style="margin-left: 0.8rem;">全选</button>
    </div>
    <div class="batch-bar-actions">
      <button class="batch-btn" id="batchCancel">取消</button>
      <button class="batch-btn primary" id="batchDownload" disabled>下载选中</button>
    </div>
  </div>

  <footer>
    Winston 还在这里 · 原型版本
  </footer>

  <!-- 灯箱 -->
  <div class="lightbox" id="lightbox">
    <button class="close-btn" id="closeLightbox">&times;</button>
    <div class="lightbox-content">
      <div class="lightbox-media-wrap" id="lightboxMedia"></div>
      <div class="lightbox-info">
        <div class="lightbox-header">
          <p class="lightbox-caption" id="lightboxCaption"></p>
          <p class="lightbox-meta" id="lightboxMeta"></p>
        </div>
        <div class="lightbox-actions">
          <button class="btn-small" id="downloadBtn">⬇️ 保存原图</button>
          <button class="btn-small" id="deleteBtn" style="background: #c1121f; color: white;">🗑️ 删除</button>
        </div>
        <div class="comments" id="commentsList"></div>
        <div class="comment-form">
          <input type="text" id="commentInput" placeholder="你想对他说什么？" />
          <button class="btn-small" id="commentSubmit">发送</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/supabase.min.js"></script>
  <script src="js/app.js?v=3"></script>
  <script>
    (async function() {
      try {
        await initDB();
        subscribeToChanges();
        const gallery = document.getElementById('gallery');
        await renderGallery(gallery, { emptyText: '这里还空着，可以先去放一张照片' });

        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            await renderGallery(gallery, { filter: btn.dataset.filter, emptyText: '这个分类里还什么都没有' });
          });
        });

        // 删除按钮
        const deleteBtn = document.getElementById('deleteBtn');
        if (deleteBtn) {
          deleteBtn.addEventListener('click', async () => {
            if (!currentMeta) return;
            const success = await deleteMedia(currentMeta.id);
            if (success) {
              closeLightbox();
              await renderGallery(gallery, { emptyText: '这里还空着，可以先去放一张照片' });
            }
          });
        }

        // ===== 批量下载 =====
        let selectionMode = false;
        const batchBar = document.getElementById('batchBar');
        const batchToggle = document.getElementById('batchDownloadToggle');
        const batchSelectAll = document.getElementById('batchSelectAll');
        const batchCancel = document.getElementById('batchCancel');
        const batchDownload = document.getElementById('batchDownload');

        function toggleSelectionMode() {
          selectionMode = !selectionMode;
          gallery.classList.toggle('select-mode', selectionMode);
          batchBar.classList.toggle('show', selectionMode);
          batchToggle.textContent = selectionMode ? ' 退出选择' : '📥 批量下载';
          if (!selectionMode) {
            document.querySelectorAll('.polaroid.selected').forEach(c => c.classList.remove('selected'));
            updateBatchBar();
          } else {
            updateBatchBar();
          }
        }

        if (batchToggle) batchToggle.addEventListener('click', toggleSelectionMode);

        if (batchSelectAll) {
          batchSelectAll.addEventListener('click', () => {
            const cards = document.querySelectorAll('.polaroid');
            const selected = document.querySelectorAll('.polaroid.selected');
            if (selected.length === cards.length && cards.length > 0) {
              cards.forEach(c => c.classList.remove('selected'));
            } else {
              cards.forEach(c => c.classList.add('selected'));
            }
            updateBatchBar();
          });
        }

        if (batchCancel) {
          batchCancel.addEventListener('click', () => {
            if (selectionMode) toggleSelectionMode();
          });
        }

        if (batchDownload) {
          batchDownload.addEventListener('click', async () => {
            await batchDownloadSelected();
          });
        }
      } catch (err) {
        showInitError('画廊初始化失败：' + (err.message || err));
      }
    })();
  </script>
</body>
</html>
