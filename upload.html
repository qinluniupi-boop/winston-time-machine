<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>上传回忆 - Winston 的时光机</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1 class="title"><a href="index.html">Winston 的时光机</a></h1>
    <p class="subtitle">一些关于 Winston 的时间碎片</p>
    <div class="paw-divider"></div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="gallery.html">回忆长廊</a></li>
        <li><a href="upload.html" class="active">上传回忆</a></li>
        <li><a href="days.html">纪念日</a></li>
        <li><a href="about.html">关于 Winston</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="memory-card">
      <h2 class="section-title">放一张 Winston 的照片</h2>
      <div class="form-row">
        <div>
          <label for="uploaderName">你是谁</label>
          <input type="text" id="uploaderName" placeholder="比如：妈妈" />
        </div>
        <div>
          <label for="memoryDate">什么时候拍的</label>
          <input type="date" id="memoryDate" />
        </div>
      </div>
      <div style="margin-bottom: 1rem;">
        <label for="memoryCaption">关于这一刻</label>
        <textarea id="memoryCaption" placeholder="那天发生了什么，你还记得吗？"></textarea>
      </div>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp,video/mp4,video/quicktime" />
        <div id="dropText">
          <div style="font-size: 1.5rem; margin-bottom: 0.3rem;">🖼️</div>
          <div>把照片或视频放进来</div>
          <div class="file-hint">支持 JPG、PNG、GIF、MP4、MOV 等格式</div>
        </div>
      </div>
      <div style="margin-top: 1rem; text-align: right;">
        <div id="uploadProgress" style="display:none; margin-bottom:0.5rem; font-size:0.85rem; color:var(--ink-light);">准备上传…</div>
        <button class="btn-primary" id="uploadBtn" disabled>放这里</button>
      </div>
      <div id="debugLog" style="display:none; margin-top:1rem; padding:0.8rem; background:#f9f5e9; border:1px dashed #c9a86c; border-radius:3px; font-size:0.8rem; color:#6b5e4f; line-height:1.5; font-family:monospace; white-space:pre-wrap;"></div>
    </section>
  </main>

  <footer>
    Winston 还在这里 · 原型版本
  </footer>

  <script src="js/supabase.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async function() {
      try {
        await initDB();

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const dropText = document.getElementById('dropText');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadProgress = document.getElementById('uploadProgress');
        const uploaderName = document.getElementById('uploaderName');
        const memoryDate = document.getElementById('memoryDate');
        const memoryCaption = document.getElementById('memoryCaption');

        memoryDate.value = new Date().toISOString().slice(0, 10);
        let selectedFile = null;

        function formatFileName(file) {
          const max = 20;
          const name = file.name;
          if (name.length <= max) return name;
          return name.slice(0, 10) + '...' + name.slice(-7);
        }

        function handleFileSelect(file) {
          if (!file) return;
          selectedFile = file;
          dropText.innerHTML = `<div style="font-size:1.3rem;margin-bottom:0.3rem;">✅</div><div>已选择：${formatFileName(selectedFile)}</div><div class="file-hint">${(selectedFile.size / 1024 / 1024).toFixed(2)} MB · 点击可重新选择</div>`;
          uploadBtn.disabled = false;
          uploadBtn.textContent = '放这里';
        }

        fileInput.addEventListener('change', (e) => {
          const files = e.target.files || (e.dataTransfer && e.dataTransfer.files);
          if (files && files[0]) {
            handleFileSelect(files[0]);
          }
        });

        ['dragenter', 'dragover'].forEach((evt) => {
          dropZone.addEventListener(evt, (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        });
        ['dragleave', 'drop'].forEach((evt) => {
          dropZone.addEventListener(evt, (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); });
        });
        dropZone.addEventListener('drop', (e) => {
          const files = e.dataTransfer && e.dataTransfer.files;
          if (files && files[0]) {
            handleFileSelect(files[0]);
          }
        });

        const debugLog = document.getElementById('debugLog');
        function log(msg) {
          const line = `[${new Date().toLocaleTimeString()}] ${msg}`;
          console.log(line);
          debugLog.style.display = 'block';
          debugLog.textContent += line + '\n';
        }

        function fetchWithTimeout(url, options, timeoutMs = 30000) {
          if (typeof AbortController !== 'undefined') {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            return fetch(url, { ...options, signal: controller.signal }).finally(() => clearTimeout(timer));
          }
          return Promise.race([
            fetch(url, options),
            new Promise((_, reject) => setTimeout(() => reject(new Error(`请求超时（${timeoutMs / 1000} 秒）`)), timeoutMs))
          ]);
        }

        function readTextWithTimeout(response, timeoutMs = 5000) {
          return Promise.race([
            response.text(),
            new Promise((_, reject) => setTimeout(() => reject(new Error('读取响应超时')), timeoutMs))
          ]);
        }

        uploadBtn.addEventListener('click', async () => {
          if (!selectedFile) return;
          debugLog.textContent = '';
          uploadBtn.disabled = true;
          uploadBtn.textContent = '上传中…';
          uploadProgress.style.display = 'block';
          uploadProgress.textContent = '准备上传…';

          const name = uploaderName.value.trim() || '某个想他的人';
          const caption = memoryCaption.value.trim();
          const date = memoryDate.value || new Date().toISOString().slice(0, 10);

          const fileType = selectedFile.type || '';
          const isVideo = fileType.startsWith('video') || /\.(mp4|mov|m4v|avi|mkv)$/i.test(selectedFile.name);
          const safeName = selectedFile.name.replace(/[^a-zA-Z0-9.\-_]/g, '_') || 'file';

          const mediaId = generateId();
          const storagePath = `${mediaId}/${safeName}`;
          const contentType = fileType || (isVideo ? 'video/mp4' : 'image/jpeg');

          const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
          log(`文件: ${selectedFile.name}, 大小: ${(selectedFile.size / 1024 / 1024).toFixed(2)} MB, 类型: ${contentType}`);
          log(`网络: ${navigator.onLine ? '在线' : '离线'}, ${conn ? `effectiveType=${conn.effectiveType}, downlink=${conn.downlink}` : '未知'}`);

          try {
            // 1. 直接用 fetch 上传到 Storage，body 用 File 对象本身
            log('开始上传文件到 Storage…');
            uploadProgress.textContent = '正在把文件放到仓库…';
            const uploadResp = await fetchWithTimeout(`${SUPABASE_URL}/storage/v1/object/${BUCKET_NAME}/${storagePath}`, {
              method: 'POST',
              headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Content-Type': contentType,
                'x-upsert': 'false'
              },
              body: selectedFile
            }, 30000);
            log(`Storage 响应状态: ${uploadResp.status}`);
            if (!uploadResp.ok) {
              const errText = await readTextWithTimeout(uploadResp).catch(() => '');
              throw new Error(`Storage 上传失败 (${uploadResp.status}): ${errText}`);
            }

            // 2. 写入 media 表
            log('写入 media 表…');
            uploadProgress.textContent = '正在记录这张照片…';
            const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET_NAME}/${storagePath}`;
            const dbResp = await fetchWithTimeout(`${SUPABASE_URL}/rest/v1/media`, {
              method: 'POST',
              headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
              },
              body: JSON.stringify({
                id: mediaId,
                type: isVideo ? 'video' : 'image',
                caption,
                uploader: name,
                date,
                storage_path: storagePath,
                file_name: selectedFile.name,
                public_url: publicUrl
              })
            }, 15000);
            log(`media 表响应状态: ${dbResp.status}`);
            if (!dbResp.ok) {
              const dbErrText = await readTextWithTimeout(dbResp).catch(() => '');
              throw new Error(`media 表写入失败 (${dbResp.status}): ${dbErrText}`);
            }

            log('上传完成');
            uploadProgress.textContent = '完成';
            alert('这张照片已经留在这里了。');
            window.location.href = 'gallery.html';
          } catch (err) {
            console.error('上传失败', err);
            const detail = err && (err.error_description || err.message || err.statusText || err.status || JSON.stringify(err));
            log(`错误: ${detail || '未知错误'}`);
            alert('上传没有成功：' + (detail || '未知错误，请检查网络后重试。'));
            uploadBtn.disabled = false;
            uploadBtn.textContent = '再试一次';
            uploadProgress.style.display = 'none';
          }
        });
      } catch (err) {
        showInitError('上传页初始化失败：' + (err.message || err));
      }
    })();
  </script>
</body>
</html>
