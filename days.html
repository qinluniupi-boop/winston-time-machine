<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>纪念日 - Winston 的时光机</title>
  <link rel="stylesheet" href="css/style.css?v=2" />
  <style>
    .day-card {
      background: var(--frame);
      border: 1px solid rgba(140, 107, 74, 0.2);
      border-radius: 4px;
      padding: 0;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .day-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px var(--shadow);
    }
    .day-media {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--paper-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-light);
      font-size: 2.5rem;
      overflow: hidden;
      position: relative;
    }
    .day-media img,
    .day-media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .day-media-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.8rem;
      color: var(--ink-light);
    }
    .day-info {
      padding: 1rem;
    }
    .day-name {
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.3rem;
      font-size: 1rem;
    }
    .day-date {
      font-size: 0.85rem;
      color: var(--ink-light);
    }
    .day-countdown {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--sepia-dark);
      font-style: italic;
    }
    .day-actions {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 0 1rem 1rem;
    }
    .day-edit-btn {
      padding: 0.35rem 0.7rem;
      border: 1px solid var(--sepia);
      background: transparent;
      color: var(--accent);
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .day-edit-btn:hover {
      background: var(--sepia);
      color: var(--frame);
    }
    .day-delete-btn {
      padding: 0.35rem 0.7rem;
      border: 1px solid #c1121f;
      background: transparent;
      color: #c1121f;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .day-delete-btn:hover {
      background: #c1121f;
      color: white;
    }
    .media-upload-area {
      border: 2px dashed var(--sepia);
      border-radius: 4px;
      padding: 1rem;
      text-align: center;
      color: var(--ink-light);
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(201, 168, 108, 0.05);
      position: relative;
      margin-bottom: 0.8rem;
    }
    .media-upload-area:hover {
      background: rgba(201, 168, 108, 0.12);
      border-color: var(--sepia-dark);
    }
    .media-upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0.001;
      cursor: pointer;
      font-size: 100px;
    }
    .media-preview {
      margin-top: 0.5rem;
      max-height: 150px;
      overflow: hidden;
      border-radius: 3px;
    }
    .media-preview img,
    .media-preview video {
      max-width: 100%;
      max-height: 150px;
      object-fit: cover;
    }
    .remove-media-btn {
      margin-top: 0.3rem;
      padding: 0.25rem 0.5rem;
      border: 1px solid #c1121f;
      background: transparent;
      color: #c1121f;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .remove-media-btn:hover {
      background: #c1121f;
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <h1 class="title"><a href="index.html">Winston 的时光机</a></h1>
    <p class="subtitle">一些关于 Winston 的时间碎片</p>
    <div class="paw-divider"></div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="gallery.html">回忆长廊</a></li>
        <li><a href="upload.html">上传回忆</a></li>
        <li><a href="days.html" class="active">纪念日</a></li>
        <li><a href="about.html">关于 Winston</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="memory-card">
      <h2 class="section-title">要记住的日子</h2>
      <div id="daysList" class="days-list"></div>
      <button class="btn-add" id="openDayModal">+ 再加一个日子</button>
    </section>
  </main>

  <footer>
    Winston 还在这里 · 原型版本
  </footer>

  <!-- 添加/编辑纪念日弹窗 -->
  <div class="modal" id="dayModal">
    <div class="modal-box">
      <h3 class="modal-title" id="dayModalTitle">加一个日子</h3>
      <div style="margin-bottom: 0.8rem;">
        <label>是什么日子</label>
        <input type="text" id="dayName" placeholder="比如 Winston 第一次学会握手" />
      </div>
      <div style="margin-bottom: 0.8rem;">
        <label>哪一天</label>
        <input type="date" id="dayDate" />
      </div>
      <div style="margin-bottom: 0.8rem;">
        <label>放一张照片或视频（可选）</label>
        <div class="media-upload-area" id="dayMediaUpload">
          <input type="file" id="dayMediaInput" accept="image/*,video/*" />
          <div id="dayMediaUploadText">
            <div style="font-size: 1.5rem;">📷</div>
            <div>点击选择照片或视频</div>
          </div>
        </div>
        <div id="dayMediaPreview" class="media-preview" style="display: none;"></div>
        <button class="remove-media-btn" id="removeDayMedia" style="display: none;">移除媒体</button>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancelDay">算了</button>
        <button class="btn-primary" id="saveDay">记下</button>
      </div>
    </div>
  </div>

  <script src="js/supabase.min.js"></script>
  <script src="js/app.js?v=2"></script>
  <script>
    (async function() {
      try {
        await initDB();
        subscribeToChanges();
        const daysList = document.getElementById('daysList');
        await renderDays(daysList);

        const dayModal = document.getElementById('dayModal');
        const dayModalTitle = document.getElementById('dayModalTitle');
        const dayName = document.getElementById('dayName');
        const dayDate = document.getElementById('dayDate');
        const dayMediaInput = document.getElementById('dayMediaInput');
        const dayMediaUploadText = document.getElementById('dayMediaUploadText');
        const dayMediaPreview = document.getElementById('dayMediaPreview');
        const removeDayMedia = document.getElementById('removeDayMedia');

        let editingDayId = null;
        let selectedDayMedia = null;
        let existingDayMedia = null;
        let mediaRemoved = false;

        function resetModal() {
          editingDayId = null;
          selectedDayMedia = null;
          existingDayMedia = null;
          mediaRemoved = false;
          dayModalTitle.textContent = '加一个日子';
          dayName.value = '';
          dayDate.value = '';
          dayMediaInput.value = '';
          dayMediaUploadText.innerHTML = '<div style="font-size: 1.5rem;">📷</div><div>点击选择照片或视频</div>';
          dayMediaPreview.style.display = 'none';
          dayMediaPreview.innerHTML = '';
          removeDayMedia.style.display = 'none';
        }

        function handleDayMediaSelect(file) {
          if (!file) return;
          selectedDayMedia = file;
          existingDayMedia = null;
          mediaRemoved = false;
          dayMediaUploadText.innerHTML = `<div style="font-size:1.2rem;">✅</div><div>已选择：${file.name}</div>`;
          
          const preview = document.createElement(file.type.startsWith('video') ? 'video' : 'img');
          preview.src = URL.createObjectURL(file);
          if (file.type.startsWith('video')) preview.controls = true;
          dayMediaPreview.innerHTML = '';
          dayMediaPreview.appendChild(preview);
          dayMediaPreview.style.display = 'block';
          removeDayMedia.style.display = 'inline-block';
        }

        dayMediaInput.addEventListener('change', (e) => {
          const files = e.target.files;
          if (files && files[0]) {
            handleDayMediaSelect(files[0]);
          }
        });

        removeDayMedia.addEventListener('click', () => {
          selectedDayMedia = null;
          existingDayMedia = null;
          mediaRemoved = true;
          dayMediaInput.value = '';
          dayMediaUploadText.innerHTML = '<div style="font-size: 1.5rem;">📷</div><div>点击选择照片或视频</div>';
          dayMediaPreview.style.display = 'none';
          dayMediaPreview.innerHTML = '';
          removeDayMedia.style.display = 'none';
        });

        document.getElementById('openDayModal').addEventListener('click', () => {
          resetModal();
          dayModal.classList.add('open');
        });
        document.getElementById('cancelDay').addEventListener('click', () => {
          dayModal.classList.remove('open');
          resetModal();
        });
        dayModal.addEventListener('click', (e) => { 
          if (e.target === dayModal) {
            dayModal.classList.remove('open');
            resetModal();
          }
        });

        document.getElementById('saveDay').addEventListener('click', async () => {
          const name = dayName.value.trim();
          const date = dayDate.value;
          if (!name || !date) {
            alert('请填写完整的日期信息');
            return;
          }

          const saveBtn = document.getElementById('saveDay');
          saveBtn.disabled = true;
          saveBtn.textContent = '保存中...';

          try {
            if (editingDayId) {
              // 编辑模式
              const updateData = { name, date };
              console.log('编辑模式, dayId:', editingDayId);
              console.log('selectedDayMedia:', selectedDayMedia ? selectedDayMedia.name : 'null');
              console.log('existingDayMedia:', existingDayMedia);
              
              // 处理媒体上传
              if (selectedDayMedia) {
                console.log('开始上传新媒体...');
                const mediaResult = await uploadDayMedia(selectedDayMedia, editingDayId);
                console.log('上传结果:', mediaResult);
                if (mediaResult) {
                  updateData.media_url = mediaResult.publicUrl;
                  updateData.media_type = mediaResult.type;
                  updateData.media_storage_path = mediaResult.storagePath;
                }
              } else if (mediaRemoved && existingDayMedia) {
                // 用户明确点击了移除媒体
                console.log('移除现有媒体...');
                if (existingDayMedia.media_storage_path) {
                  await client.storage.from(BUCKET_NAME).remove([existingDayMedia.media_storage_path]);
                }
                updateData.media_url = null;
                updateData.media_type = null;
                updateData.media_storage_path = null;
              }

              console.log('最终 updateData:', updateData);
              const { data, error } = await client.from('days').update(updateData).eq('id', editingDayId);
              console.log('更新结果:', { data, error });
              if (error) throw error;
            } else {
              // 新增模式
              const insertData = { name, date };
              
              if (selectedDayMedia) {
                const mediaResult = await uploadDayMedia(selectedDayMedia);
                if (mediaResult) {
                  insertData.media_url = mediaResult.publicUrl;
                  insertData.media_type = mediaResult.type;
                  insertData.media_storage_path = mediaResult.storagePath;
                }
              }

              const { error } = await client.from('days').insert(insertData);
              if (error) throw error;
            }

            dayModal.classList.remove('open');
            resetModal();
            await renderDays(daysList);
          } catch (err) {
            console.error('保存失败:', err);
            alert('保存失败：' + err.message);
          } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = '记下';
          }
        });

        // 暴露编辑函数给 app.js 调用
        window.openEditDayModal = async (day) => {
          const password = prompt('请输入编辑密码：');
          if (password !== 'winston') {
            if (password !== null) alert('密码错误');
            return;
          }

          resetModal();
          editingDayId = day.id;
          existingDayMedia = day;
          dayModalTitle.textContent = '编辑纪念日';
          dayName.value = day.name;
          dayDate.value = day.date;

          if (day.media_url) {
            const preview = document.createElement(day.media_type === 'video' ? 'video' : 'img');
            preview.src = day.media_url;
            if (day.media_type === 'video') preview.controls = true;
            dayMediaPreview.innerHTML = '';
            dayMediaPreview.appendChild(preview);
            dayMediaPreview.style.display = 'block';
            removeDayMedia.style.display = 'inline-block';
            dayMediaUploadText.innerHTML = '<div style="font-size:1.2rem;">✅</div><div>已有媒体，可点击更换</div>';
          }

          dayModal.classList.add('open');
        };
      } catch (err) {
        showInitError('纪念日页初始化失败：' + (err.message || err));
      }
    })();
  </script>
</body>
</html>
